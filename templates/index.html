<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaWebsite | Offline Cloud Music</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <section class="tree-panel sidebar-tree">
          <div class="section-head">
            <h2>目录树</h2>
          </div>
          <div id="tree-empty" class="tree-empty">设置根目录后，这里会显示分类与文件。</div>
          <div id="tree-root" class="tree-root" hidden></div>
        </section>
        <button id="open-settings-button" class="settings-button" type="button">设置扫描路径</button>
      </aside>

      <main class="main-panel">
        <section class="hero-card">
          <div class="hero-copy">
            <p class="brand-kicker">Now Playing</p>
            <h2 id="now-title">等待选择媒体文件</h2>
            <p id="now-meta" class="hero-meta">点击目录树中的文件，或直接播放全库。</p>
          </div>
          <div class="hero-actions">
            <button id="play-all-button" class="control-button" type="button">播放全库</button>
            <button id="prev-button" class="control-button" type="button">上一首</button>
            <button id="play-toggle-button" class="control-button primary" type="button">播放</button>
            <button id="next-button" class="control-button" type="button">下一首</button>
          </div>
        </section>

        <section class="player-card">
          <div class="section-head">
            <h2>播放器</h2>
            <div class="mode-group">
              <button data-mode="single" class="mode-chip is-active" type="button">单曲播放</button>
              <button data-mode="sequence" class="mode-chip" type="button">顺序播放</button>
              <button data-mode="shuffle" class="mode-chip" type="button">随机播放</button>
              <button data-mode="repeat" class="mode-chip" type="button">循环播放</button>
            </div>
          </div>

          <div class="player-surface">
            <audio id="audio-player" class="media-player" controls preload="metadata" hidden></audio>
            <video id="video-player" class="media-player" controls preload="metadata" hidden></video>
          </div>
        </section>

        <section class="playlist-card">
          <div class="section-head">
            <h2 id="playlist-title">当前播放列表</h2>
            <span id="playlist-meta" class="muted-pill">0 首</span>
          </div>
          <div id="playlist-empty" class="tree-empty">当前还没有可播放的列表。</div>
          <div id="playlist-list" class="playlist-list" hidden></div>
        </section>
      </main>
    </div>

    <template id="category-template">
      <section class="category-block">
        <div class="category-head">
          <button class="category-toggle" type="button"></button>
          <button class="category-play" type="button">播放本类</button>
        </div>
        <div class="category-files"></div>
      </section>
    </template>

    <template id="file-template">
      <button class="file-node" type="button">
        <span class="file-kind"></span>
        <span class="file-name"></span>
      </button>
    </template>

    <template id="playlist-item-template">
      <button class="playlist-item" type="button">
        <span class="playlist-index"></span>
        <span class="playlist-name"></span>
        <span class="playlist-kind"></span>
      </button>
    </template>

    <div id="settings-modal" class="settings-modal" hidden>
      <div id="settings-backdrop" class="settings-backdrop"></div>
      <section class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="section-head">
          <h2 id="settings-title">设置扫描路径</h2>
          <span id="config-status" class="status-pill">Idle</span>
        </div>
        <form id="config-form" class="config-form">
          <label>
            <span>Root Dir</span>
            <input
              id="root-dir-input"
              name="root_dir"
              type="text"
              placeholder="/Users/you/Music"
              required
            />
          </label>
          <p class="path-hint">默认读取 `~/Music`。扫描时会跳过没有权限的目录。</p>
          <div class="settings-actions">
            <button id="close-settings-button" class="secondary-button" type="button">关闭</button>
            <button type="submit">保存并扫描</button>
          </div>
        </form>
      </section>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
